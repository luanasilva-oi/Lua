<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando...</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
height:100vh;
overflow:hidden;
user-select:none;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
opacity:0;
animation:fadeIn 1.2s ease forwards;
}

/* FADE LOAD */

@keyframes fadeIn{
to{
opacity:1;
}
}

/* TITULO */

h1{
color:white;
font-size:2.6rem;
margin-bottom:20px;
text-shadow:0 0 15px rgba(0,0,0,0.7);
}

/* TIMER */

.timer{
font-size:1.6rem;
color:#ff9800;
margin-bottom:30px;
font-weight:bold;
}

/* BOTAO */

.telegram-btn{
display:flex;
align-items:center;
gap:12px;
background:#0088cc;
color:white;
text-decoration:none;
padding:18px 42px;
border-radius:50px;
font-size:1.8rem;
font-weight:bold;
transition:0.25s;
box-shadow:0 10px 25px rgba(0,136,204,0.35);
border:2px solid white;
}

/* HOVER */

.telegram-btn:hover{
transform:scale(1.07);
background:#0077b5;
}

/* ICON */

.telegram-icon{
width:30px;
height:30px;
fill:white;
}

/* SUB */

.sub{
margin-top:20px;
color:#ddd;
font-size:1rem;
opacity:0.9;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video autoplay muted loop playsinline class="video-bg">
<source src="assets/video.mp4" type="video/mp4">
</video>

<!-- CONTEUDO -->

<div class="overlay">

<h1>Oq Tu Ker Tá Aqui</h1>

<div class="timer">
Redirecionando em <span id="timer">5</span> segundos
</div>

<a href="https://t.me/Luana_Oficial_bot?start=tiktok" 
id="redirect-link"
class="telegram-btn"
target="_blank"
rel="noopener noreferrer">

<svg class="telegram-icon" viewBox="0 0 24 24">
<path d="M12 0C5.373 0 0 5.373 0 12s5.373 
12 12 12 12-5.373 12-12S18.627 
0 12 0zm5.562 8.161l-1.97 
9.274c-.145.658-.537.818-1.084.508l-3-2.211-1.447 
1.394c-.16.16-.295.295-.605.295l.213-3.053 
5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 
4.326-2.962-.924c-.643-.203-.657-.643.136-.953l11.57-4.458c.538-.196 
1.006.128.832.941z"/>
</svg>

CLIQUE AQUI

</a>

<div class="sub">
Ao clicar, você será direcionado para o Telegram.
</div>

</div>

<script>

/* BLOQUEAR MENU */

document.addEventListener("contextmenu",e=>e.preventDefault())

document.addEventListener("keydown",function(e){

if(
(e.ctrlKey && ["s","u","i","j"].includes(e.key.toLowerCase()))
|| e.key === "F12"
){
e.preventDefault()
}

})

/* REDIRECIONAMENTO */

let seconds = 5
const timer = document.getElementById("timer")
const link = document.getElementById("redirect-link").href

const countdown = setInterval(()=>{

seconds--
timer.textContent = seconds

if(seconds <= 0){

clearInterval(countdown)
window.location.href = link

}

},1000)

</script>

</body>
</html>
