<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
}

.container{
    background:#1b1b1b;
    padding:35px;
    border-radius:14px;
    width:340px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h2{
    margin-bottom:25px;
    font-size:22px;
}

.verify-box{

    background:#111;
    border:2px solid #333;
    padding:18px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    cursor:pointer;
}

.verify-box input{
    width:28px;
    height:28px;
    cursor:pointer;
}

.verify-box label{
    font-size:18px;
    cursor:pointer;
}

.arrow{
    font-size:26px;
    animation:blink 1s infinite;
    margin-bottom:10px;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

.btn{
    margin-top:25px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    cursor:pointer;
    opacity:0.5;
}

.btn.active{
    opacity:1;
}

.loading{
    display:none;
    margin-top:20px;
}

.spinner{
    border:4px solid #333;
    border-top:4px solid #2ecc71;
    border-radius:50%;
    width:35px;
    height:35px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.info{
    margin-top:18px;
    font-size:13px;
    color:#aaa;
}

</style>

<script>

function loadFacebookPixel(){
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '2658714351180755');
fbq('track', 'PageView');
}

function verifyHuman(){

const check = document.getElementById("verify");
const btn = document.getElementById("btn");

if(check.checked){
btn.classList.add("active");
}else{
btn.classList.remove("active");
}

}

function redirect(){

const check = document.getElementById("verify");
const load = document.getElementById("loading");

if(check.checked){

load.style.display="block";

if(typeof fbq !== 'undefined'){
fbq('track','Lead');
}

setTimeout(()=>{
window.location.replace("https://t.me/Luana_Oficial_bot?start=tiktok");
},900);

}

}

</script>

</head>

<body>

<div class="container">

<h2>🔒 Verificação</h2>

<div class="arrow">👇</div>

<div class="verify-box">

<input type="checkbox" id="verify" onchange="verifyHuman()">

<label for="verify">Não sou robô</label>

</div>

<button id="btn" class="btn" onclick="redirect()">
CONTINUAR
</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Redirecionando...</p>
</div>

<div class="info">
Após confirmar você irá para o Telegram
</div>

</div>

</body>
</html>
